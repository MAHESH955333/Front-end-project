<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#4facfe,#00f2fe);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-box{
            background:white;
            padding:35px;
            width:350px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
        }

        h2{
            text-align:center;
            margin-bottom:25px;
            color:#333;
        }

        label{
            font-weight:bold;
            color:#555;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:8px;
            margin-bottom:18px;
            border:1px solid #ccc;
            border-radius:8px;
            outline:none;
            font-size:15px;
        }

        input:focus{
            border-color:#4facfe;
            box-shadow:0 0 8px rgba(79,172,254,0.5);
        }

        button{
            width:100%;
            padding:12px;
            background:#4facfe;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#008cff;
        }
    </style>

</head>

<body>

    <div class="login-box">
        <h2>Login</h2>

        <form>
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter Username">

            <label>Password</label>
            <input type="password" name="password" placeholder="Enter Password">

            <button type="submit">Login</button>
        </form>
    </div>

</body>
</html>
